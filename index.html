<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 - Pokémon</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header>
        <h1>LAB 05</h1>
        <p>Traer pokemon por nombre y guardar en Base de Datos</p>
    </header>

    <main class="contenedor">
        <section class="buscador">
            <input type="text" id="pokemonName" list="pokemonSuggestions" placeholder="Ingrese el nombre del Pokémon">
            <datalist id="pokemonSuggestions"></datalist>
            <button id="btnBuscar">Buscar</button>
            <button id="btnGuardar">Guardar</button>
            <section id="infoPokemon" class="info-pokemon">
                <p>Información de Pokémon</p>
            </section>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>

</html>
